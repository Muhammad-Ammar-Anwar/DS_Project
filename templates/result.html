<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .result-container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .prediction-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .prediction-label {
            color: #666;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .back-button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="result-container">
        <h1>Wine Quality Prediction</h1>
        <div class="prediction-label">Predicted Quality Score:</div>
        <div class="prediction-value">{{ prediction }}</div>
        <a href="/" class="back-button">Make Another Prediction</a>
    </div>
</body>
</html>
